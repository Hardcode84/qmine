<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quantum Minesweeper — Solver Tests</title>
  <style>
    body { font-family: 'Courier New', monospace; margin: 20px; background: #1a1a2e; color: #e0e0e0; }
    h2 { color: #a0a0ff; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; font-weight: bold; }
    .warn { color: #ffb74d; }
    .section { color: #64b5f6; font-weight: bold; margin-top: 0.5em; }
    #summary { margin-top: 1em; font-size: 1.3em; padding: 8px; }
  </style>
</head>
<body>
  <h2>Solver Tests</h2>
  <pre id="output"></pre>
  <div id="summary"></div>
  <script type="module">
    import { solve, verify, neighbors, cellKey } from './solver.js';

    const output = document.getElementById('output');
    const summaryEl = document.getElementById('summary');
    let passed = 0, failed = 0, warned = 0;

    function log(text, cls) {
      const span = document.createElement('span');
      span.textContent = text + '\n';
      if (cls) { span.className = cls; }
      output.appendChild(span);
    }

    function section(name) { log('\n' + name, 'section'); }

    function assert(condition, msg) {
      if (condition) { passed++; log('  ✓ ' + msg, 'pass'); }
      else { failed++; log('  ✗ ' + msg, 'fail'); }
    }

    function warn(msg) {
      warned++;
      log('  ⚠ ' + msg, 'warn');
    }

    function solveAndVerify(params, msg) {
      const result = solve(params);
      assert(result !== null, msg + ' — has solution');
      if (result) {
        const v = verify({ ...params, mines: result });
        assert(v.valid, msg + ' — valid: ' + (v.reason || 'ok'));
      }
      return result;
    }

    // ── Shared helpers ──

    function buildExpertScenario({ revealMax = 150, startCell = [8, 15] } = {}) {
      const rows = 16, cols = 30, totalMines = 99;
      const key = (r, c) => cellKey(r, c, cols);

      const allCells = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          allCells.push([r, c]);
        }
      }
      for (let i = allCells.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allCells[i], allCells[j]] = [allCells[j], allCells[i]];
      }
      const realMines = new Set(allCells.slice(0, totalMines).map(([r, c]) => key(r, c)));

      function trueNum(r, c) {
        let n = 0;
        for (const [nr, nc] of neighbors(r, c, rows, cols)) {
          if (realMines.has(key(nr, nc))) { n++; }
        }
        return n;
      }

      const revealed = [];
      const visited = new Set();
      const queue = [startCell];
      while (queue.length > 0 && revealed.length < revealMax) {
        const [r, c] = queue.shift();
        const k = key(r, c);
        if (visited.has(k) || realMines.has(k) || r < 0 || r >= rows || c < 0 || c >= cols) continue;
        visited.add(k);
        const num = trueNum(r, c);
        revealed.push({ row: r, col: c, number: num });
        if (num === 0) {
          for (const [nr, nc] of neighbors(r, c, rows, cols)) {
            if (!visited.has(key(nr, nc))) { queue.push([nr, nc]); }
          }
        }
      }

      return { rows, cols, totalMines, revealed, realMines, key };
    }

    // ── Neighbors ──

    section('Neighbors utility');
    assert(neighbors(0, 0, 3, 3).length === 3, 'corner: 3 neighbors');
    assert(neighbors(0, 1, 3, 3).length === 5, 'edge: 5 neighbors');
    assert(neighbors(1, 1, 3, 3).length === 8, 'center: 8 neighbors');
    assert(neighbors(0, 0, 1, 1).length === 0, '1×1 board: 0 neighbors');

    // ── cellKey ──

    section('cellKey utility');
    assert(cellKey(0, 0, 9) === 0, '(0,0) → 0');
    assert(cellKey(1, 0, 9) === 9, '(1,0) → 9');
    assert(cellKey(2, 3, 10) === 23, '(2,3) w=10 → 23');

    // ── Basic solve ──

    section('Empty board (no constraints)');
    {
      const r = solve({ rows: 3, cols: 3, totalMines: 1, revealed: [], forcedMine: [], forcedEmpty: [] });
      assert(r !== null, 'has solution');
      assert(r.size === 1, 'exactly 1 mine');
    }

    section('Zero mines');
    {
      const r = solve({ rows: 3, cols: 3, totalMines: 0, revealed: [], forcedMine: [], forcedEmpty: [] });
      assert(r !== null, 'has solution');
      assert(r.size === 0, '0 mines placed');
    }

    // ── Forced cells ──

    section('Force mine at (0,0)');
    {
      const r = solve({ rows: 3, cols: 3, totalMines: 1, revealed: [], forcedMine: [[0, 0]], forcedEmpty: [] });
      assert(r !== null, 'has solution');
      assert(r.has(0), 'mine at cell 0');
      assert(r.size === 1, 'exactly 1 mine');
    }

    section('Force empty at (0,0)');
    {
      const r = solve({ rows: 3, cols: 3, totalMines: 1, revealed: [], forcedMine: [], forcedEmpty: [[0, 0]] });
      assert(r !== null, 'has solution');
      assert(!r.has(0), 'no mine at cell 0');
    }

    section('Force all corners as mines');
    {
      const r = solve({
        rows: 3, cols: 3, totalMines: 4, revealed: [],
        forcedMine: [[0, 0], [0, 2], [2, 0], [2, 2]], forcedEmpty: []
      });
      assert(r !== null, 'has solution');
      assert(r.has(0) && r.has(2) && r.has(6) && r.has(8), 'mines at all 4 corners');
    }

    // ── Contradictions ──

    section('Contradiction: same cell forced mine and empty');
    {
      const r = solve({ rows: 3, cols: 3, totalMines: 1, revealed: [], forcedMine: [[0, 0]], forcedEmpty: [[0, 0]] });
      assert(r === null, 'detected contradiction');
    }

    section('Contradiction: more forced mines than total');
    {
      const r = solve({ rows: 3, cols: 3, totalMines: 1, revealed: [], forcedMine: [[0, 0], [0, 1]], forcedEmpty: [] });
      assert(r === null, 'detected too many forced mines');
    }

    section('Contradiction: mine forced next to revealed 0');
    {
      const r = solve({
        rows: 3, cols: 3, totalMines: 1,
        revealed: [{ row: 1, col: 1, number: 0 }],
        forcedMine: [[0, 0]], forcedEmpty: []
      });
      assert(r === null, 'mine impossible next to 0');
    }

    section('Contradiction: all neighbors forced empty but number > 0');
    {
      const r = solve({
        rows: 3, cols: 3, totalMines: 1,
        revealed: [{ row: 1, col: 1, number: 1 }],
        forcedMine: [],
        forcedEmpty: [[0, 0], [0, 1], [0, 2], [1, 0], [1, 2], [2, 0], [2, 1], [2, 2]]
      });
      assert(r === null, 'no mine can satisfy number 1');
    }

    // ── Number constraints ──

    section('Center revealed as 1 on 3×3');
    solveAndVerify({
      rows: 3, cols: 3, totalMines: 1,
      revealed: [{ row: 1, col: 1, number: 1 }],
      forcedMine: [], forcedEmpty: []
    }, '3×3 center=1');

    section('Center revealed as 8 on 3×3 (all neighbors mined)');
    solveAndVerify({
      rows: 3, cols: 3, totalMines: 8,
      revealed: [{ row: 1, col: 1, number: 8 }],
      forcedMine: [], forcedEmpty: []
    }, '3×3 center=8');

    section('Multiple revealed cells');
    solveAndVerify({
      rows: 5, cols: 5, totalMines: 4,
      revealed: [
        { row: 2, col: 2, number: 2 },
        { row: 0, col: 0, number: 0 },
        { row: 4, col: 4, number: 1 },
      ],
      forcedMine: [], forcedEmpty: []
    }, '5×5 multi-reveal');

    section('Revealed 0 forces all neighbors empty');
    {
      const r = solve({
        rows: 3, cols: 3, totalMines: 0,
        revealed: [{ row: 1, col: 1, number: 0 }],
        forcedMine: [], forcedEmpty: []
      });
      assert(r !== null && r.size === 0, '0-cell means no mines around');
    }

    // ── Combined constraints + forced cells ──

    section('Forced mine + number constraint interaction');
    {
      const r = solveAndVerify({
        rows: 3, cols: 3, totalMines: 1,
        revealed: [{ row: 1, col: 1, number: 1 }],
        forcedMine: [[0, 0]], forcedEmpty: []
      }, '3×3 center=1, mine at (0,0)');
      if (r) { assert(r.has(0), 'mine at (0,0) confirmed'); }
    }

    section('Forced empty narrows possibilities');
    {
      const r = solve({
        rows: 3, cols: 3, totalMines: 1,
        revealed: [{ row: 1, col: 1, number: 1 }],
        forcedMine: [],
        forcedEmpty: [[0, 0], [0, 1], [0, 2], [1, 0], [1, 2], [2, 0], [2, 1]]
      });
      assert(r !== null, 'has solution');
      if (r) { assert(r.has(8), 'mine forced to (2,2)'); }
    }

    // ── Fully determined board ──

    section('Unique solution board');
    {
      const results = new Set();
      for (let i = 0; i < 20; i++) {
        const r = solve({
          rows: 3, cols: 3, totalMines: 1,
          revealed: [
            { row: 0, col: 1, number: 1 }, { row: 0, col: 2, number: 0 },
            { row: 1, col: 0, number: 1 }, { row: 1, col: 1, number: 1 }, { row: 1, col: 2, number: 0 },
            { row: 2, col: 0, number: 0 }, { row: 2, col: 1, number: 0 }, { row: 2, col: 2, number: 0 },
          ],
          forcedMine: [], forcedEmpty: []
        });
        if (r) { results.add([...r].join(',')); }
      }
      assert(results.size === 1, 'unique solution: always same layout');
      assert(results.has('0'), 'mine at cell 0 = (0,0)');
    }

    // ── Injectable RNG ──

    section('Deterministic RNG produces repeatable results');
    {
      function seeded(seed) {
        let s = seed;
        return () => { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; };
      }
      const r1 = solve({ rows: 5, cols: 5, totalMines: 3, revealed: [], forcedMine: [], forcedEmpty: [], random: seeded(42) });
      const r2 = solve({ rows: 5, cols: 5, totalMines: 3, revealed: [], forcedMine: [], forcedEmpty: [], random: seeded(42) });
      assert(r1 !== null && r2 !== null, 'both have solutions');
      if (r1 && r2) {
        const s1 = [...r1].sort().join(',');
        const s2 = [...r2].sort().join(',');
        assert(s1 === s2, 'same seed → same layout');
      }
    }

    // ── Randomness ──

    section('Randomness: unconstrained board');
    {
      const layouts = new Set();
      for (let i = 0; i < 50; i++) {
        const r = solve({ rows: 3, cols: 3, totalMines: 1, revealed: [], forcedMine: [], forcedEmpty: [] });
        if (r) { layouts.add([...r].sort().join(',')); }
      }
      assert(layouts.size > 1, `${layouts.size} distinct layouts in 50 runs`);
    }

    section('Randomness: constrained board with multiple solutions');
    {
      const layouts = new Set();
      for (let i = 0; i < 50; i++) {
        const r = solve({
          rows: 3, cols: 3, totalMines: 2,
          revealed: [{ row: 1, col: 1, number: 2 }],
          forcedMine: [], forcedEmpty: []
        });
        if (r) { layouts.add([...r].sort().join(',')); }
      }
      assert(layouts.size > 1, `${layouts.size} distinct constrained layouts in 50 runs`);
    }

    // ── verify edge cases ──

    section('verify rejects bad input');
    {
      const v = verify({ rows: 3, cols: 3, totalMines: 1, mines: undefined });
      assert(!v.valid, 'undefined mines rejected');
    }

    // ── Performance: realistic mid-game expert ──

    section('Performance: mid-game expert board');
    {
      const scenario = buildExpertScenario({ revealMax: 150 });
      const { rows, cols, totalMines, revealed } = scenario;

      const start = performance.now();
      const result = solve({ rows, cols, totalMines, revealed, forcedMine: [], forcedEmpty: [] });
      const elapsed = performance.now() - start;

      assert(result !== null, `expert mid-game (${revealed.length} revealed) has solution`);
      if (elapsed >= 5000) {
        warn(`${elapsed.toFixed(1)}ms — slow (> 5s), may vary by hardware`);
      } else {
        assert(true, `${elapsed.toFixed(1)}ms`);
      }
      if (result) {
        const v = verify({ rows, cols, totalMines, revealed, forcedMine: [], forcedEmpty: [], mines: result });
        assert(v.valid, 'layout valid: ' + (v.reason || 'ok'));
      }
    }

    section('Performance: expert board with quantum flags');
    {
      const scenario = buildExpertScenario({ revealMax: 120 });
      const { rows, cols, totalMines, revealed, realMines, key } = scenario;

      const revealedSet = new Set(revealed.map(({ row, col }) => key(row, col)));
      let qMine = null, qEmpty = null;
      for (let r = 0; r < rows && (!qMine || !qEmpty); r++) {
        for (let c = 0; c < cols && (!qMine || !qEmpty); c++) {
          const k = key(r, c);
          if (revealedSet.has(k)) continue;
          if (!qMine && realMines.has(k)) { qMine = [r, c]; }
          if (!qEmpty && !realMines.has(k)) { qEmpty = [r, c]; }
        }
      }

      const forcedMine = qMine ? [qMine] : [];
      const forcedEmpty = qEmpty ? [qEmpty] : [];

      const start = performance.now();
      const result = solve({ rows, cols, totalMines, revealed, forcedMine, forcedEmpty });
      const elapsed = performance.now() - start;

      assert(result !== null, 'expert with q-flags has solution');
      if (elapsed >= 5000) {
        warn(`${elapsed.toFixed(1)}ms — slow (> 5s), may vary by hardware`);
      } else {
        assert(true, `${elapsed.toFixed(1)}ms`);
      }
      if (result) {
        const v = verify({ rows, cols, totalMines, revealed, forcedMine, forcedEmpty, mines: result });
        assert(v.valid, 'layout valid: ' + (v.reason || 'ok'));
      }
    }

    // ── Summary ──

    const summary = `${passed} passed, ${failed} failed` + (warned ? `, ${warned} warnings` : '');
    summaryEl.textContent = summary;
    summaryEl.className = failed === 0 ? 'pass' : 'fail';
  </script>
</body>
</html>
