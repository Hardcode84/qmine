<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quantum Minesweeper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root { --cell-size: 28px; }

body {
  background: #c0c0c0;
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
  user-select: none;
  -webkit-user-select: none;
}

#game {
  background: #c0c0c0;
  border: 3px outset #fff;
  padding: 8px;
}

#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #c0c0c0;
  border: 2px inset #808080;
  padding: 4px 6px;
  margin-bottom: 8px;
}

.counter {
  background: #000;
  color: #f00;
  font-family: 'Courier New', monospace;
  font-size: 24px;
  font-weight: bold;
  padding: 2px 4px;
  min-width: 52px;
  text-align: right;
  border: 1px inset #808080;
  letter-spacing: 2px;
}

#controls {
  display: flex;
  gap: 4px;
  align-items: center;
}

.header-btn {
  font-size: 22px;
  width: 36px;
  height: 36px;
  border: 2px outset #fff;
  background: #c0c0c0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.header-btn:active { border-style: inset; }

#collapse-btn {
  font-size: 13px;
  width: auto;
  padding: 0 8px;
  white-space: nowrap;
  visibility: hidden;
}
#collapse-btn.active {
  visibility: visible;
  background: #d8b4fe;
  border-color: #a855f7;
}
#collapse-btn.active:hover { background: #c084fc; }

#quantum-score {
  font-size: 11px;
  font-weight: bold;
  color: #6b21a8;
  min-width: 36px;
  text-align: center;
}

#board {
  display: inline-grid;
  border: 3px inset #808080;
  background: #c0c0c0;
}

.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  border: 2px outset #fff;
  background: #c0c0c0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  line-height: 1;
}

.cell.revealed {
  border: 1px solid #808080;
  background: #d0d0d0;
  cursor: default;
}

.cell.n1 { color: #0000ff; }
.cell.n2 { color: #008000; }
.cell.n3 { color: #ff0000; }
.cell.n4 { color: #000080; }
.cell.n5 { color: #800000; }
.cell.n6 { color: #008080; }
.cell.n7 { color: #000000; }
.cell.n8 { color: #808080; }

.cell.flagged { color: #cc0000; font-size: 16px; }
.cell.qmine {
  background: #e9d5ff;
  border-color: #a855f7;
  color: #7c3aed;
  font-size: 16px;
}
.cell.qempty {
  background: #cffafe;
  border-color: #06b6d4;
  color: #0891b2;
  font-size: 14px;
}

.cell.quantum-resolved { background: #ede9fe; }
.cell.quantum-resolved.revealed { background: #ede9fe; }

.cell.exploded {
  background: #ff0000;
  border: 1px solid #808080;
}

.cell.mine-shown {
  border: 1px solid #808080;
  background: #d0d0d0;
  font-size: 16px;
}

.cell.wrong-flag {
  border: 1px solid #808080;
  background: #d0d0d0;
  color: #cc0000;
  font-size: 14px;
}

.cell.confirmed-flag {
  color: #059669;
  font-size: 16px;
}

#footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  padding: 0 2px;
}

#difficulty {
  font-size: 13px;
  padding: 2px 4px;
  background: #c0c0c0;
  border: 2px inset #808080;
  cursor: pointer;
}

#status-msg {
  font-size: 13px;
  font-weight: bold;
  text-align: center;
  min-height: 18px;
  color: #333;
}

.decoherence { color: #7c3aed !important; }
</style>
</head>
<body>
<div id="game">
  <div id="header">
    <div class="counter" id="mine-counter">000</div>
    <div id="controls">
      <div id="quantum-score">Q:0</div>
      <button class="header-btn" id="collapse-btn" title="Collapse quantum flags (Space)">⚛️</button>
      <button class="header-btn" id="new-game-btn" title="New game (N)">🙂</button>
    </div>
    <div class="counter" id="timer">000</div>
  </div>
  <div id="board"></div>
  <div id="footer">
    <select id="difficulty">
      <option value="beginner">Beginner (9×9)</option>
      <option value="intermediate">Intermediate (16×16)</option>
      <option value="expert">Expert (30×16)</option>
    </select>
    <div id="status-msg"></div>
  </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
